<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - FoodHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">🍔 FoodHub</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Menu</a>
      <a href="cart.html">Cart 🛒 <span id="cart-count" class="badge">0</span></a>
      <span id="auth-link"></span>
    </nav>
  </header>

  <section class="section">
    <h2 class="section-title">Checkout</h2>
    <div class="checkout-wrapper">
      <form id="checkout-form" class="checkout-form">
        <h3>Delivery Information</h3>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <textarea id="address" placeholder="Delivery Address" required></textarea>
        
        <h3>Payment Method</h3>
        <label><input type="radio" name="payment" value="cash" checked> Cash on Delivery</label>
        <label><input type="radio" name="payment" value="card"> Credit Card</label>
        
        <button type="submit" class="btn-primary big">Place Order ✅</button>
      </form>
      <div class="order-summary" id="order-summary"></div>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
