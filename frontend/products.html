<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu - FoodHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">🍔 FoodHub</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html" class="active">Menu</a>
      <a href="cart.html">Cart 🛒 <span id="cart-count" class="badge">0</span></a>
      <span id="auth-link"></span>
    </nav>
  </header>

  <section class="section">
    <h2 class="section-title">Our Menu</h2>
    <div class="filter-bar">
      <input type="text" id="search" placeholder="🔍 Search meals...">
      <select id="filter-category">
        <option value="All">All Categories</option>
        <option value="Pizza">Pizza</option>
        <option value="Burgers">Burgers</option>
        <option value="Sandwiches">Sandwiches</option>
        <option value="Salads">Salads</option>
        <option value="Pasta">Pasta</option>
        <option value="Desserts">Desserts</option>
        <option value="Sides">Sides</option>
      </select>
    </div>
    <div class="products-grid" id="products-list">
      <p style="text-align:center;">Loading...</p>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
